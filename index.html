<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" type="button" title="Cambiar tema claro/oscuro" aria-label="Cambiar tema claro/oscuro">🌙</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <p id="overlay-stats" class="best-stats"></p>
        <div id="overlay-score-table" class="score-table-container"></div>
        <div id="overlay-save-form" class="save-form hidden">
          <input type="text" id="name-input" maxlength="10" placeholder="Tu nombre" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay hidden">
      <div class="overlay-box">
        <p id="start-title" class="screen-title">TETRIS</p>
        <div id="start-score-table" class="score-table-container"></div>
        <p id="start-best-stats" class="best-stats"></p>
        <button id="play-btn">Jugar</button>
        <button id="reset-scores-start" class="secondary-btn">Resetear récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
